<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>m1kasaz agent</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260527b" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="brand-mark">M</div>
          <div>
            <h1>m1kasaz agent</h1>
            <p>统一输入，自动完成检索与文档处理</p>
          </div>
        </div>

        <button id="newConversationBtn" class="new-chat-btn" type="button">新对话</button>

        <section class="sidebar-section recent-section">
          <div class="section-label">最近输入</div>
          <div id="recentList" class="recent-list"></div>
        </section>

        <section class="sidebar-section">
          <div class="section-label">本地设置</div>
          <button id="settingsBtn" class="ghost-btn settings-btn" type="button">模型配置</button>
        </section>

        <div class="sidebar-footer">
          <button id="healthBtn" class="ghost-btn" type="button">刷新状态</button>
          <span id="healthBadge" class="status-badge pending">检查中</span>
        </div>
      </aside>

      <main class="main-panel">
        <header class="conversation-header">
          <div class="header-side header-side-right">
            <span id="headerStatusText" class="header-status">服务连接中</span>
          </div>
        </header>

        <section class="conversation-canvas">
          <section id="settingsPanel" class="settings-panel hidden" aria-label="模型设置">
            <div class="settings-panel-header">
              <div>
                <h3>模型设置</h3>
                <p>API Key 仅保存在当前机器的本地应用数据库中，不会回显原始值。</p>
              </div>
              <button id="settingsCloseBtn" class="ghost-btn" type="button">关闭</button>
            </div>

            <div class="settings-grid">
              <article class="settings-card">
                <div class="settings-card-header">
                  <div>
                    <h4>OpenAI</h4>
                    <p>配置 OpenAI 官方接口。</p>
                  </div>
                  <span id="openaiStatusBadge" class="status-badge pending">未检查</span>
                </div>
                <p id="openaiStatusText" class="settings-status-copy">尚未读取配置状态。</p>
                <label class="field">
                  <span>OPENAI_API_KEY</span>
                  <input id="openaiApiKeyInput" type="password" placeholder="输入 OpenAI API Key" autocomplete="off" />
                </label>
                <div class="settings-actions">
                  <button id="saveOpenaiBtn" class="send-btn settings-save-btn" type="button">保存</button>
                  <button id="clearOpenaiBtn" class="ghost-btn" type="button">清空</button>
                </div>
              </article>

              <article class="settings-card">
                <div class="settings-card-header">
                  <div>
                    <h4>Anthropic</h4>
                    <p>配置 Anthropic 官方接口。</p>
                  </div>
                  <span id="anthropicStatusBadge" class="status-badge pending">未检查</span>
                </div>
                <p id="anthropicStatusText" class="settings-status-copy">尚未读取配置状态。</p>
                <label class="field">
                  <span>ANTHROPIC_API_KEY</span>
                  <input id="anthropicApiKeyInput" type="password" placeholder="输入 Anthropic API Key" autocomplete="off" />
                </label>
                <div class="settings-actions">
                  <button id="saveAnthropicBtn" class="send-btn settings-save-btn" type="button">保存</button>
                  <button id="clearAnthropicBtn" class="ghost-btn" type="button">清空</button>
                </div>
              </article>

              <article class="settings-card settings-card-wide">
                <div class="settings-card-header">
                  <div>
                    <h4>OpenAI-compatible</h4>
                    <p>配置兼容 OpenAI 协议的服务，例如阿里云等。</p>
                  </div>
                  <span id="compatibleStatusBadge" class="status-badge pending">未检查</span>
                </div>
                <p id="compatibleStatusText" class="settings-status-copy">尚未读取配置状态。</p>
                <label class="field">
                  <span>BASE_URL</span>
                  <input id="compatibleBaseUrlInput" type="url" placeholder="输入兼容服务 Base URL" autocomplete="off" />
                </label>
                <label class="field">
                  <span>API_KEY</span>
                  <input id="compatibleApiKeyInput" type="password" placeholder="输入兼容服务 API Key" autocomplete="off" />
                </label>
                <div class="settings-actions">
                  <button id="saveCompatibleBtn" class="send-btn settings-save-btn" type="button">保存</button>
                  <button id="clearCompatibleBtn" class="ghost-btn" type="button">清空</button>
                </div>
              </article>
            </div>
          </section>

          <div id="emptyState" class="empty-state">
            <div class="empty-state-icon">◎</div>
            <h3 id="emptyTitle">今天想聊点什么？</h3>
            <p id="emptyHint">你可以直接提问，也可以使用下方推荐卡片快速开始。</p>
            <div id="suggestionList" class="suggestion-list"></div>
          </div>

          <div id="conversationList" class="conversation-list hidden"></div>
        </section>

        <div class="composer-area">
          <div id="errorBox" class="error-box hidden"></div>

          <div class="composer-shell">
            <textarea
              id="promptInput"
              class="prompt-input"
              rows="1"
              placeholder="请输入问题"
            ></textarea>

            <div class="composer-upload-row">
              <input id="documentFileInput" class="hidden" type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
              <button id="documentFileTrigger" class="ghost-btn file-trigger-btn" type="button" aria-label="上传 PDF 或 DOCX">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 16V5" />
                  <path d="M8 9l4-4 4 4" />
                  <path d="M5 19h14" />
                </svg>
              </button>
              <div id="selectedFileBadge" class="selected-file hidden">
                <span id="selectedFileName" class="selected-file-name"></span>
                <button id="clearSelectedFileBtn" class="selected-file-clear" type="button" aria-label="清除已选文件">×</button>
              </div>
            </div>

            <div class="composer-toolbar">
              <div class="composer-mode-controls">
                <div id="chatControls" class="mode-controls">
                  <div class="chat-preset-switch" role="tablist" aria-label="选择聊天模式">
                    <button class="chat-preset-pill active" data-chat-preset="quick" type="button">快速</button>
                    <button class="chat-preset-pill" data-chat-preset="think" type="button">思考</button>
                  </div>
                  <span id="chatPresetDescription" class="mode-tip">适用于大部分情况</span>
                </div>
              </div>

              <div class="composer-actions">
                <span id="loadingText" class="loading-text"></span>
                <button id="sendBtn" class="send-btn" type="button">发送</button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/static/app.js?v=20260527b"></script>
  </body>
</html>
